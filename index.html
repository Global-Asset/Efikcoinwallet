<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0B0B0F">
  <title>Efikcoin Wallet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: #0B0B0F; color: #fff; max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { width: 100%; padding: 20px; text-align: center; }
    .logo { width: 100px; height: 100px; margin: 0 auto 30px; border-radius: 50%; box-shadow: 0 0 50px rgba(240, 185, 11, 0.6); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 50px rgba(240, 185, 11, 0.6); } 50% { box-shadow: 0 0 80px rgba(240, 185, 11, 0.9); } }
    h1 { color: #F0B90B; font-size: 32px; font-weight: 800; margin-bottom: 10px; }
    .subtitle { color: #888; font-size: 16px; margin-bottom: 40px; }
    .card { background: rgba(26, 26, 31, 0.9); border-radius: 24px; padding: 30px; border: 1px solid rgba(240, 185, 11, 0.3); }
    input { width: 100%; padding: 18px; background: rgba(11, 11, 15, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; color: #fff; font-size: 16px; margin: 10px 0; text-align: center; }
    button { width: 100%; padding: 18px; background: linear-gradient(90deg, #F0B90B, #FFD700); color: #000; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; margin: 10px 0; }
    .status { margin-top: 20px; font-size: 14px; color: #00E676; }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://ipfs.io/ipfs/bafybeihrzyodihyp5met2hs32ppj37qlowuxarvs2lnlrgujgrlwxc7fwe" class="logo" alt="EFC Logo">
    <h1>Efikcoin Wallet</h1>
    <p class="subtitle">Secure. Global. Yours.</p>
    
    <div class="card">
      <h2 style="margin-bottom: 20px;">Step 1: Create Password</h2>
      <input type="password" id="password" placeholder="Enter Strong Password" minlength="8">
      <input type="password" id="confirmPassword" placeholder="Confirm Password">
      <button onclick="testStep1()">Create Wallet & Test</button>
      <div class="status" id="status"></div>
    </div>
  </div>

<script>
function testStep1() {
  const pass = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPassword').value;
  const status = document.getElementById('status');
  
  if (pass.length < 8) {
    status.style.color = '#FF4757';
    status.textContent = '❌ Password must be 8+ characters';
    return;
  }
  if (pass !== confirm) {
    status.style.color = '#FF4757';
    status.textContent = '❌ Passwords do not match';
    return;
  }
  
  // Test: Save password temporarily
  localStorage.setItem('efc_step1_test', 'success');
  status.style.color = '#00E676';
  status.innerHTML = '✅ STEP 1 WORKS!<br><br>EFC logo shows.<br>Password saves.<br><br>Reply "STEP 1 DONE" and I send STEP 2.';
}

// Check if Step 1 already passed
if (localStorage.getItem('efc_step1_test') === 'success') {
  document.getElementById('status').style.color = '#00E676';
  document.getElementById('status').textContent = '✅ Step 1 already complete. Reply "STEP 1 DONE" for Step 2.';
}
</script>
</body>
</html>
